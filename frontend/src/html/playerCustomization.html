
  <div class="customizeBody">

    <!-- Person Color Buttons -->
    <div id="playerContainer">
      <h2>Player Customization</h2>
      <div id="playerControls">
        <div id="genderSelector">
          <button class="arrow-btn" id="leftArrow">⮜</button>
          <span id="genderLabel">Male</span>
          <button class="arrow-btn" id="rightArrow">⮞</button>
        </div>
        <div class="option">
          <label
            >Skin<input
              type="color"
              class="color-picker"
              data-mat="Skin"
              value="#ff0000"
          /></label>
        </div>
        <div class="option">
          <label
            >Shirt<input
              type="color"
              class="color-picker"
              data-mat="Shirt"
              value="#ff0000"
          /></label>
        </div>
        <div class="option">
          <label
            >Shorts<input
              type="color"
              class="color-picker"
              data-mat="Shorts"
              value="#ff0000"
          /></label>
        </div>
        <div class="option">
          <label
            >Shoes<input
              type="color"
              class="color-picker"
              data-mat="Shoes"
              value="#ff0000"
          /></label>
        </div>
        <div class="option">
          <label
            >Helmet<input
              type="color"
              class="color-picker"
              data-mat="Helmet"
              value="#A7E800"
          /></label>
        </div>
        <div class="option">
          <label
            >Padding<input
            type="color"
            class="color-picker"
            data-mat="Padding"
            value="#333333"
          /></label>
        </div>
      </div>
    </div>

    <!-- Bike Color Buttons -->
    <div id="bikeContainer">
      <h2>Bike Customization</h2>
      <div id="bikeControls">
        <div class="option">
          <label
            >Frame<input
              type="color"
              class="color-picker"
              data-mat="Frame_Mat"
              value="#ff0000"
          /></label>
        </div>
        <div class="option">
          <label
            >Tires<input
              type="color"
              class="color-picker"
              data-mat="Tire_Mat"
              value="#ff0000"
          /></label>
        </div>
        <div class="option">
          <label
            >Grip<input
              type="color"
              class="color-picker"
              data-mat="Grip_Mat"
              value="#ff0000"
          /></label>
        </div>
        <div class="option">
          <label
            >Seat<input
              type="color"
              class="color-picker"
              data-mat="Seat_Mat"
              value="#ff0000"
          /></label>
        </div>
        <div class="option">
          <label
            >Pedals<input
              type="color"
              class="color-picker"
              data-mat="Pedal_Mat"
              value="#ff0000"
          /></label>
        </div>
        <div class="option">
          <label
            >Pedal Crank<input
              type="color"
              class="color-picker"
              data-mat="PedalCrank_Mat"
              value="#ff0000"
          /></label>
        </div>
      </div>
    </div>

    <!-- Save Button -->
    <div id="menu">
      <button id="menuButton" onclick="viewManager.setView(viewManager.views.mainMenu);">
        Main Menu
      </button>
    </div>
  </div>
